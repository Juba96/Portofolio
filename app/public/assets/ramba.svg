<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="rbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2d3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f12;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="rglow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#rbg)"/>
  <rect width="800" height="1000" fill="url(#rglow)"/>
  <!-- Phone frame -->
  <g transform="translate(200,150)">
    <rect x="0" y="0" width="400" height="700" rx="48" fill="#111818" stroke="#14b8a6" stroke-width="3"/>
    <rect x="140" y="16" width="120" height="28" rx="14" fill="#0a0f0f"/>
    <!-- Screen -->
    <rect x="16" y="56" width="368" height="628" rx="32" fill="#0a1414"/>
    <!-- Header -->
    <text x="36" y="100" fill="#fff" font-family="sans-serif" font-size="22" font-weight="700">Ramba</text>
    <text x="36" y="128" fill="#5eead4" font-family="sans-serif" font-size="13">Car Wash Subscription</text>
    <!-- Plan card -->
    <rect x="36" y="150" width="328" height="150" rx="20" fill="#134e4a" stroke="#14b8a6" stroke-width="1"/>
    <text x="56" y="190" fill="#5eead4" font-family="sans-serif" font-size="13" font-weight="700">PREMIUM PLAN</text>
    <text x="56" y="230" fill="#fff" font-family="sans-serif" font-size="36" font-weight="800">25,000 <tspan font-size="16">IQD/mo</tspan></text>
    <text x="56" y="260" fill="#99f6e4" font-family="sans-serif" font-size="13">Unlimited washes at 12 partners</text>
    <!-- Map preview -->
    <rect x="36" y="320" width="328" height="180" rx="16" fill="#111818"/>
    <circle cx="120" cy="420" r="8" fill="#14b8a6"/>
    <circle cx="260" cy="380" r="8" fill="#14b8a6"/>
    <circle cx="200" cy="460" r="10" fill="#fbbf24"/>
    <path d="M120 420 Q 180 390 200 460" stroke="#5eead4" stroke-width="2" stroke-dasharray="4 4" fill="none"/>
    <!-- Partner locations -->
    <rect x="36" y="520" width="328" height="48" rx="12" fill="#111818"/>
    <circle cx="60" cy="544" r="12" fill="#134e4a"/>
    <text x="82" y="549" fill="#fff" font-family="sans-serif" font-size="13">Shine &amp; Go Car Wash</text>
    <text x="82" y="562" fill="#5eead4" font-family="sans-serif" font-size="11">Karrada · 1.2km</text>
  </g>
  <text x="400" y="920" text-anchor="middle" fill="#14b8a6" font-family="sans-serif" font-size="28" font-weight="700">Ramba</text>
  <text x="400" y="960" text-anchor="middle" fill="#5eead4" font-family="sans-serif" font-size="14">Car Wash Subscription · Partner Network</text>
</svg>
